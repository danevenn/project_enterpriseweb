name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones antiguas de la misma rama/PR cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Calidad: tipos, lint y tests unitarios/componente. Sin infraestructura ni secretos.
  quality:
    name: Typecheck · Lint · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Tests unitarios + componente (con cobertura)
        run: pnpm test:coverage

      - name: Subir cobertura a Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Integración: Route Handlers contra un Postgres real, pero EFÍMERO (service
  # container en el propio runner → localhost, latencia ~0, sin tocar Neon).
  integration:
    name: Integración (Postgres efímero)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ci_test?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Crear el esquema en el Postgres efímero
        run: pnpm exec prisma db push --skip-generate

      - name: Tests de integración
        run: pnpm test:integration
