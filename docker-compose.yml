services:
  postgres:
    image: postgres:16
    container_name: enterpriseweb-postgres
    restart: unless-stopped
    # Puerto 5433 en el host para no chocar con otros Postgres locales (p.ej. corelink en 5432).
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: enterpriseweb
      POSTGRES_PASSWORD: enterpriseweb
      POSTGRES_DB: enterpriseweb
    volumes:
      - enterpriseweb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterpriseweb -d enterpriseweb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  enterpriseweb_pgdata:
